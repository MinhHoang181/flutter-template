name: template
description: "Template"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

workspace:
  - core_extension
  - core_widget
  - icon

dependencies:
  flutter:
    sdk: flutter

  # ========================================
  # Core
  # ========================================
  core_extension:
    path: core_extension
  core_widget:
    path: core_widget
  icon:
    path: icon

  # ========================================
  # State Management & Architecture
  # ========================================
  flutter_bloc: ^9.1.1
  get_it: ^9.2.0
  dart_mediator: ^0.4.1
  rxdart: ^0.28.0

  # ========================================
  # Networking & API
  # ========================================
  dio: ^5.9.0

  # ========================================
  # Navigation & Routing
  # ========================================
  go_router: ^17.0.1

  # ========================================
  # Code Generation
  # ========================================
  retrofit: ^4.9.2
  injectable: ^2.7.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # ========================================
  # Localization & Internationalization
  # ========================================
  easy_localization: ^3.0.8
  intl: ^0.20.2
  currency_text_input_formatter: ^2.3.0

  # ========================================
  # Device & Permissions
  # ========================================
  device_info_plus: ^12.3.0
  package_info_plus: ^9.0.0

  # ========================================
  # Forms
  # ========================================
  reactive_forms: ^18.2.2

  # ========================================
  # UI & Design
  # ========================================
  infinite_scroll_pagination: ^5.1.1
  calendar_date_picker2: ^2.0.1

  # ========================================
  # Local Storage & Preferences
  # ========================================
  shared_preferences: ^2.5.4
  flutter_secure_storage: ^10.0.0

  # ========================================
  # Environment & Configuration
  # ========================================
  flutter_dotenv: ^6.0.0
  flutter_svg: ^2.0.10+1
  vector_graphics: ^1.1.11

  # ========================================
  # Logging & Debugging
  # ========================================
  talker: ^5.1.12
  talker_bloc_logger: ^5.1.12
  talker_dio_logger: ^5.1.12

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  flutter_lints: ^6.0.0

  # ========================================
  # Configuration (Remove after config)
  # ========================================
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  rename: ^3.1.0
  change_app_package_name: ^1.5.0

  # ========================================
  # Code Generation Tools
  # ========================================
  build_runner: ^2.10.5
  freezed: ^3.2.4
  injectable_generator: ^2.12.0
  json_serializable: ^6.11.4
  go_router_builder: ^4.1.3
  flutter_gen_runner: ^5.12.0
  retrofit_generator: ^10.2.1

flutter_gen:
  output: lib/gen/
  line_length: 80
  integrations:
    image: true
    flutter_svg: true
  assets:
    outputs:
      style: dot-delimiter
      directory_path_enabled: true
    exclude:
      - assets/fonts/**
  fonts:
    enabled: true

flutter:
  default-flavor: prod
  uses-material-design: true
  assets:
    # environment
    - .env

    # fonts
    - assets/fonts/

    # translations
    - assets/translations/

    # dev images
    - path: assets/images/dev/
      flavors:
      - dev

    # icons
    - assets/icons/

    # images
    - assets/images/
  
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Thin.ttf
          weight: 100
        - asset: assets/fonts/Roboto-ThinItalic.ttf
          weight: 100
          style: italic
        - asset: assets/fonts/Roboto-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Roboto-ExtraLightItalic.ttf
          weight: 200
          style: italic
        - asset: assets/fonts/Roboto-Light.ttf
          weight: 300
        - asset: assets/fonts/Roboto-LightItalic.ttf
          weight: 300
          style: italic
        - asset: assets/fonts/Roboto-Regular.ttf
          weight: 400
        - asset: assets/fonts/Roboto-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/Roboto-Medium.ttf
          weight: 500
        - asset: assets/fonts/Roboto-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/Roboto-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Roboto-SemiBoldItalic.ttf
          weight: 600
          style: italic
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
        - asset: assets/fonts/Roboto-BoldItalic.ttf
          weight: 700
          style: italic
        - asset: assets/fonts/Roboto-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Roboto-ExtraBoldItalic.ttf
          weight: 800
          style: italic
        - asset: assets/fonts/Roboto-Black.ttf
          weight: 900
        - asset: assets/fonts/Roboto-BlackItalic.ttf
          weight: 900
          style: italic