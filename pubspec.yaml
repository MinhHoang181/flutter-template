name: template
description: "Template"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # ========================================
  # State Management & Architecture
  # ========================================
  flutter_bloc: ^9.1.1
  get_it: ^8.2.0
  dart_mediator: ^0.4.1
  rxdart: ^0.28.0

  # ========================================
  # Data
  # ========================================
  equatable: ^2.0.7

  # ========================================
  # Networking & API
  # ========================================
  dio: ^5.9.0

  # ========================================
  # Navigation & Routing
  # ========================================
  go_router: ^16.2.1

  # ========================================
  # Code Generation
  # ========================================
  retrofit: ^4.7.2
  retrofit_generator: ^10.0.5
  injectable: ^2.5.1

  # ========================================
  # Localization & Internationalization
  # ========================================
  easy_localization: ^3.0.8
  intl: ^0.20.2
  diacritic: ^0.1.6
  currency_text_input_formatter: ^2.3.0

  # ========================================
  # Device Features & Permissions
  # ========================================
  device_info_plus: ^12.1.0
  package_info_plus: ^9.0.0
  path_provider: ^2.1.5

  # ========================================
  # UI & Design
  # ========================================
  cached_network_image: ^3.4.1
  flutter_svg: ^2.2.1

  # ========================================
  # Local Storage & Preferences
  # ========================================
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4

  # ========================================
  # Environment & Configuration
  # ========================================
  flutter_dotenv: ^5.2.1 

  # ========================================
  # Logging & Debugging
  # ========================================
  talker: ^5.0.0
  talker_bloc_logger: ^5.0.0
  talker_dio_logger: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # ========================================
  # Configuration (Remove after config)
  # ========================================
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6
  rename: ^3.1.0

  # ========================================
  # Code Generation Tools
  # ========================================
  build_runner: ^2.8.0
  freezed: ^3.2.3
  injectable_generator: ^2.8.1
  json_serializable: ^6.11.1
  go_router_builder: ^4.0.1
  flutter_gen_runner: ^5.11.0

dependency_overrides:
  # override wait injectable_generator to support build 4.0.0
  build: any

flutter_gen:
  output: lib/gen/
  line_length: 120
  integrations:
    image: true
    flutter_svg: true
  assets:
    outputs:
      style: dot-delimiter
  fonts:
    enabled: false

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/fonts/
    - assets/translations/
  
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Thin.ttf
          weight: 100
        - asset: assets/fonts/Roboto-ThinItalic.ttf
          weight: 100
          style: italic
        - asset: assets/fonts/Roboto-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Roboto-ExtraLightItalic.ttf
          weight: 200
          style: italic
        - asset: assets/fonts/Roboto-Light.ttf
          weight: 300
        - asset: assets/fonts/Roboto-LightItalic.ttf
          weight: 300
          style: italic
        - asset: assets/fonts/Roboto-Regular.ttf
          weight: 400
        - asset: assets/fonts/Roboto-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/Roboto-Medium.ttf
          weight: 500
        - asset: assets/fonts/Roboto-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/Roboto-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Roboto-SemiBoldItalic.ttf
          weight: 600
          style: italic
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
        - asset: assets/fonts/Roboto-BoldItalic.ttf
          weight: 700
          style: italic
        - asset: assets/fonts/Roboto-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Roboto-ExtraBoldItalic.ttf
          weight: 800
          style: italic
        - asset: assets/fonts/Roboto-Black.ttf
          weight: 900
        - asset: assets/fonts/Roboto-BlackItalic.ttf
          weight: 900
          style: italic